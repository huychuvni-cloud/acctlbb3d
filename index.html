<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Quản Lý Tài Khoản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Đảm bảo nút copy hiện ra khi hover trên thiết bị có chuột */
        .group:hover .copy-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 py-8 px-4 font-sans text-black flex flex-col justify-center">
    
    <!-- Màn hình đăng nhập -->
    <div id="loginScreen" class="max-w-md w-full mx-auto bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Hệ Thống Quản Lý</h1>
            <p class="text-gray-500 mt-2">Vui lòng đăng nhập để xem dữ liệu</p>
        </div>
        
        <form id="loginForm" onsubmit="event.preventDefault();">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                    Tên đăng nhập
                </label>
                <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="username" type="text" placeholder="Nhập admin">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    Mật khẩu
                </label>
                <input class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 mb-2 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" id="password" type="password" placeholder="Nhập admin">
                <p id="errorMessage" class="text-red-500 text-sm italic hidden">Tên đăng nhập hoặc mật khẩu không đúng!</p>
            </div>
            <div class="flex items-center justify-between">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline transition-colors" type="button">
                    Đăng Nhập
                </button>
            </div>
        </form>
    </div>

    <!-- Bảng dữ liệu (Ẩn mặc định) -->
    <div id="mainApp" class="hidden max-w-6xl mx-auto w-full bg-white rounded-xl shadow-lg p-6 overflow-hidden">
        
        <!-- Header & Controls -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                Danh Sách Tài Khoản Hệ Thống
            </h1>
            
            <button id="toggleBtn" class="flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all shadow-sm active:scale-95 bg-blue-600 text-white hover:bg-blue-700">
                <span id="toggleIcon">
                    <!-- Icon PaintBucket -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"/></svg>
                </span>
                <span id="toggleText">Đang hiển thị: Gom Nhóm Màu</span>
            </button>
        </div>

        <!-- Bảng dữ liệu -->
        <div class="overflow-x-auto border-2 border-black rounded-sm shadow-sm">
            <table class="w-full text-sm border-collapse">
                <thead>
                    <tr class="bg-white">
                        <th class="border border-black px-3 py-2 text-center font-bold w-12">STT</th>
                        <th class="border border-black px-3 py-2 text-left font-bold w-48">Username TNT</th>
                        <th class="border border-black px-3 py-2 text-center font-bold w-64">Passwords TNT</th>
                        <th class="border border-black px-3 py-2 text-left font-bold w-40">Tên NV</th>
                        <th class="border border-black px-3 py-2 text-left font-bold w-48">Username TC</th>
                        <th class="border border-black px-3 py-2 text-center font-bold w-40">Passwords TC</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Nội dung bảng sẽ được render bằng JavaScript -->
                </tbody>
            </table>
        </div>
        
        <!-- Footer info -->
        <div class="mt-4 flex justify-between items-center text-sm text-gray-500">
            <button id="logoutBtn" class="text-red-500 hover:text-red-700 font-medium transition-colors">Đăng xuất</button>
            <span id="footerInfo">Tổng cộng: 0 tài khoản</span>
        </div>
    </div>

    <script>

        const logoutBtn = document.getElementById('logoutBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        function handleLogin() {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();

            if (user === 'admin' && pass === 'admin') {
                // Đăng nhập thành công
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                document.body.classList.remove('justify-center'); // Cho phép cuộn khi hiện bảng
                errorMessage.classList.add('hidden');
                
                // Clear input để bảo mật nhẹ
                usernameInput.value = '';
                passwordInput.value = '';
                
                // Hiển thị bảng sau khi đăng nhập thành công
                renderTable();
            } else {
                // Sai thông tin
                errorMessage.classList.remove('hidden');
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        
        // Hỗ trợ nhấn phím Enter để đăng nhập
        passwordInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
        usernameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                passwordInput.focus();
            }
        });

        // Nút đăng xuất
        logoutBtn.addEventListener('click', () => {
            mainApp.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            document.body.classList.add('justify-center');
            errorMessage.classList.add('hidden');
        });

            { id: 39, userTnt: 'binhhang33', passTnt: 'congvan1', name: 'MẹTạo', userTc: 'tcbinhhang33', passTc: 'a123123a', color: 'orange' },
            { id: 40, userTnt: 'cchtp05', passTnt: 'a123123', name: 'Lusi05', userTc: 'tccchtp05', passTc: 'a123123a', color: 'yellow' },
            { id: 41, userTnt: 'admin11', passTnt: 'admin123', name: 'Dạ Quân Lâm', userTc: 'tcadmin11', passTc: 'a123123a', color: 'white' },
            { id: 42, userTnt: 'Vungocnha2', passTnt: 'Vungocnha2', name: 'Yến Thập Tam', userTc: 'tcvungocnha2', passTc: 'a123123a', color: 'white' },
            { id: 43, userTnt: 'Tuanbmt005', passTnt: '123456a', name: 'Iris', userTc: 'tctuanbmt005', passTc: 'a123123a', color: 'white' }

        const colorWeight = {
            'blue': 1, 'orange': 2, 'pink': 3, 'yellow': 4, 'purple': 5, 'white': 6
        };

        const colorClasses = {
            'blue': 'bg-[#99c1de]', 'pink': 'bg-[#dfb6b2]', 'orange': 'bg-[#f8d49a]',
            'yellow': 'bg-[#ffff00]', 'purple': 'bg-[#d6c3df]', 'white': 'bg-white'
        };

        const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;
        const checkIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-700"><path d="M20 6 9 17l-5-5"/></svg>`;
        const paintIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"/></svg>`;
        const sortIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg>`;

        let isGrouped = true;

        document.getElementById('footerInfo').innerText = `Tổng cộng: ${rawData.length} tài khoản`;

        function handleCopy(text, buttonElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                buttonElement.innerHTML = checkIcon;
                setTimeout(() => {
                    buttonElement.innerHTML = copyIcon;
                }, 2000);
            } catch (err) {
                console.error('Lỗi khi sao chép', err);
            }
            document.body.removeChild(textArea);
        }

        function createCopyableCell(text, align = 'left') {
            const alignmentClass = align === 'center' ? 'justify-center gap-2' : 'justify-between';
            
            return `
                <div class="flex items-center group ${alignmentClass}">
                    <span>${text}</span>
                    <button
                        onclick="handleCopy('${text.replace(/'/g, "\\'")}', this)"
                        class="copy-btn opacity-0 transition-opacity p-1 rounded hover:bg-black/10 focus:opacity-100"
                        title="Sao chép"
                    >
                        ${copyIcon}
                    </button>
                </div>
            `;
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            let displayData = [...rawData];
            if (isGrouped) {
                displayData.sort((a, b) => {
                    if (colorWeight[a.color] !== colorWeight[b.color]) {
                        return colorWeight[a.color] - colorWeight[b.color];
                    }
                    return a.id - b.id;
                });
            }

            displayData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = `${colorClasses[row.color]} hover:brightness-95 transition-all duration-150`;

                tr.innerHTML = `
                    <td class="border border-black px-3 py-1 text-center font-medium">
                        ${isGrouped ? index + 1 : row.id}
                    </td>
                    <td class="border border-black px-3 py-1 whitespace-nowrap">
                        ${createCopyableCell(row.userTnt, 'left')}
                    </td>
                    <td class="border border-black px-3 py-1 text-center">
                        ${createCopyableCell(row.passTnt, 'center')}
                    </td>
                    <td class="border border-black px-3 py-1 font-medium">${row.name}</td>
                    <td class="border border-black px-3 py-1 whitespace-nowrap">
                        ${createCopyableCell(row.userTc, 'left')}
                    </td>
                    <td class="border border-black px-3 py-1 text-center">
                        ${createCopyableCell(row.passTc, 'center')}
                    </td>
                `;
                tableBody.appendChild(tr);
            });
            
            // Cập nhật giao diện nút
            const toggleBtn = document.getElementById('toggleBtn');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleText = document.getElementById('toggleText');

            if (isGrouped) {
                toggleBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all shadow-sm active:scale-95 bg-blue-600 text-white hover:bg-blue-700";
                toggleIcon.innerHTML = paintIcon;
                toggleText.innerText = "Đang hiển thị: Gom Nhóm Màu";
            } else {
                toggleBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all shadow-sm active:scale-95 bg-gray-200 text-gray-800 hover:bg-gray-300";
                toggleIcon.innerHTML = sortIcon;
                toggleText.innerText = "Đang hiển thị: Thứ Tự Gốc";
            }
        }

        // Lắng nghe sự kiện click nút đổi trạng thái
        document.getElementById('toggleBtn').addEventListener('click', () => {
            isGrouped = !isGrouped;
            renderTable();
        });

    </script>
</body>
</html>
