<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Chi Tiêu (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-in-right { animation: slideInRight 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        #loader { transition: opacity 0.3s; }
        .hidden-fade { opacity: 0; pointer-events: none; }
        
        /* Bổ sung để fix padding dưới cho main khi menu fixed */
        body { overscroll-behavior-y: none; }
        #app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
        #main-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
    </style>
</head>
<body class="bg-slate-200 text-slate-800">

    <div id="app-container" class="max-w-md mx-auto bg-slate-50 relative shadow-2xl overflow-hidden sm:border-x sm:border-slate-200">
        
        <div id="loader" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center">
            <i class="ph ph-spinner animate-spin text-5xl text-indigo-600 mb-4"></i>
            <p class="text-slate-500 font-medium" id="loader-text">Đang đồng bộ dữ liệu đám mây...</p>
        </div>

        <header class="pt-8 pb-4 px-5 bg-white sticky top-0 z-30 shadow-sm border-b border-slate-100 flex items-center justify-between">
            <div>
                <p class="text-sm text-slate-500">Xin chào,</p>
                <div class="flex items-center gap-2">
                    <p class="font-bold text-slate-800">Huy Chu 👋</p>
                    <div id="sync-status" class="w-2 h-2 rounded-full bg-slate-300 transition-colors" title="Trạng thái kết nối"></div>
                </div>
            </div>
            <button onclick="app.openAddTx()" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-full shadow-md shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">
                <i class="ph ph-plus-circle text-lg"></i>
                <span class="text-sm font-semibold">Thêm</span>
            </button>
        </header>

        <main id="main-content" class="scrollbar-hide relative"></main>

        <!-- Menu cố định ở dưới cùng màn hình (fixed bottom-0) -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto w-full bg-white/95 backdrop-blur-sm border-t border-slate-100 px-6 py-4 flex justify-between items-center rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] z-40 pb-safe">
            <button onclick="app.setTab('home')" id="nav-home" class="flex flex-col items-center gap-1 w-16 transition-colors text-indigo-600">
                <i class="ph-fill ph-house text-2xl"></i>
                <span class="text-[10px] font-semibold">Tổng quan</span>
            </button>
            <button onclick="app.setTab('wallets')" id="nav-wallets" class="flex flex-col items-center gap-1 w-16 transition-colors text-slate-400">
                <i class="ph ph-wallet text-2xl"></i>
                <span class="text-[10px] font-semibold">Tài khoản</span>
            </button>
            <button onclick="app.setTab('reports')" id="nav-reports" class="flex flex-col items-center gap-1 w-16 transition-colors text-slate-400">
                <i class="ph ph-chart-bar text-2xl"></i>
                <span class="text-[10px] font-semibold">Báo cáo</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACL12yLGdCMLe7GY2rlVbE56mh_HcQEbw",
            authDomain: "qltkcn.firebaseapp.com",
            projectId: "qltkcn",
            storageBucket: "qltkcn.firebasestorage.app",
            messagingSenderId: "271958756874",
            appId: "1:271958756874:web:3e8d418df901a5684719f3",
            measurementId: "G-S72MTV26B8"
        };
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);

        const defaultCategories = [
            { id: 'c1', name: 'Ăn uống', type: 'expense', color: 'bg-orange-500' },
            { id: 'c2', name: 'Di chuyển', type: 'expense', color: 'bg-blue-500' },
            { id: 'c3', name: 'Hóa đơn', type: 'expense', color: 'bg-red-500' },
            { id: 'c4', name: 'Giải trí', type: 'expense', color: 'bg-purple-500' },
            { id: 'c5', name: 'Lương', type: 'income', color: 'bg-green-500' },
            { id: 'c6', name: 'Thưởng', type: 'income', color: 'bg-emerald-400' },
            { id: 'c7', name: 'Thu khác', type: 'income', color: 'bg-teal-500' }
        ];

        const now = new Date();
        window.state = {
            activeTab: 'home',
            wallets: [],
            transactions: [],
            categories: [], 
            txForm: { id: null, amount: '', note: '', type: 'expense', categoryId: 'c1', walletId: '', date: '', time: '', hasImage: false },
            walletForm: { id: null, name: '', type: 'cash', balance: '', limit: '', includeInNet: true }, 
            
            dashboardFilter: { 
                period: 'month', 
                startDate: new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0],
                endDate: new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0],
                walletId: 'all'
            },
            
            selectedWalletId: null, 
            walletFilterPeriod: 'all', 
            selectedCategoryId: null, 
            catFilterPeriod: 'month',
            reportPeriod: 'month', // Thêm state cho tab Báo cáo

            isAddingCategory: false,
            newCategoryName: '',
            isConfirmingDelete: false,
            confirmingDeleteWalletId: null,
            isScanning: false,
            userId: "huychu_master_database",
            isDataLoaded: false
        };

        const formatVND = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        const getWalletIcon = (type) => {
            if (type === 'cash') return '<i class="ph ph-coins"></i>';
            if (type === 'debit') return '<i class="ph ph-bank"></i>';
            return '<i class="ph ph-credit-card"></i>';
        };

        function filterTransactions(txs, filterConf) {
            let res = txs;
            if (filterConf.walletId && filterConf.walletId !== 'all') {
                res = res.filter(t => t.walletId === filterConf.walletId);
            }
            if (filterConf.period !== 'all') {
                let start, end;
                const d = new Date();
                if (filterConf.period === 'month') {
                    start = new Date(d.getFullYear(), d.getMonth(), 1);
                    end = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
                } else if (filterConf.period === 'lastMonth') {
                    start = new Date(d.getFullYear(), d.getMonth() - 1, 1);
                    end = new Date(d.getFullYear(), d.getMonth(), 0, 23, 59, 59);
                } else if (filterConf.period === 'custom') {
                    start = new Date(filterConf.startDate + "T00:00:00");
                    end = new Date(filterConf.endDate + "T23:59:59");
                }
                res = res.filter(t => {
                    const txD = new Date(t.date + "T" + (t.time || "12:00") + ":00");
                    return txD >= start && txD <= end;
                });
            }
            return res;
        }

        function getStats() {
            let totalBalance = 0, totalExpense = 0, totalIncome = 0;
            let totalCash = 0, totalCredit = 0;

            state.wallets.filter(w => w.status !== 'deleted').forEach(w => {
                if (w.includeInNet === false) return; 
                
                if (w.type === 'credit') totalCredit += Math.abs(w.balance); 
                else totalCash += w.balance; 
            });
            totalBalance = totalCash - totalCredit;
            
            const filteredTxs = filterTransactions(state.transactions, state.dashboardFilter);
            filteredTxs.forEach(t => {
                if (t.type === 'expense') totalExpense += t.amount;
                if (t.type === 'income') totalIncome += t.amount;
            });
            
            return { totalBalance, totalExpense, totalIncome, totalCash, totalCredit };
        }

        function getCategoryStats() {
            const stats = {};
            const filteredTxs = filterTransactions(state.transactions, state.dashboardFilter);
            let totalExp = 0;

            filteredTxs.filter(t => t.type === 'expense').forEach(t => {
                if (!stats[t.categoryId]) stats[t.categoryId] = { totalAmount: 0, walletBreakdown: {} };
                stats[t.categoryId].totalAmount += t.amount;
                
                if (!stats[t.categoryId].walletBreakdown[t.walletId]) stats[t.categoryId].walletBreakdown[t.walletId] = 0;
                stats[t.categoryId].walletBreakdown[t.walletId] += t.amount;
                totalExp += t.amount;
            });

            return Object.entries(stats).map(([categoryId, data]) => {
                const category = state.categories.find(c => c.id === categoryId) || { name: 'Khác', color: 'bg-slate-400' };
                const walletDetails = Object.entries(data.walletBreakdown).map(([walletId, amount]) => {
                    const wallet = state.wallets.find(w => w.id === walletId);
                    return { walletName: wallet ? wallet.name : 'Ví đã xóa', amount };
                }).sort((a, b) => b.amount - a.amount);

                return { category, amount: data.totalAmount, percent: (data.totalAmount / totalExp) * 100 || 0, walletDetails };
            }).sort((a, b) => b.amount - a.amount);
        }

        function getGroupedTransactions(txArray) {
            const groups = {};
            txArray.forEach(t => {
                if (!groups[t.date]) groups[t.date] = [];
                groups[t.date].push(t);
            });
            return Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).map(date => ({
                date, items: groups[date].sort((a, b) => (b.time||'').localeCompare(a.time||''))
            }));
        }

        function renderDashboard() {
            const stats = getStats();
            const catStats = getCategoryStats();
            const filteredTxs = filterTransactions(state.transactions, state.dashboardFilter);
            const grouped = getGroupedTransactions(filteredTxs);
            const overBudget = stats.totalExpense > stats.totalIncome * 0.7 && state.dashboardFilter.period === 'month';

            let html = `<div class="p-4 space-y-6 fade-in pb-24">
                
                <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden mt-0">
                    <div class="absolute z-10 w-full pr-12">
                        <p class="text-slate-400 text-sm font-medium">Tổng tài sản ròng</p>
                        <h1 class="text-3xl font-bold mt-1 tracking-tight">${formatVND(stats.totalBalance)}</h1>
                        
                        <div class="flex gap-3 mt-4 mb-1">
                            <div class="bg-slate-800/60 px-3 py-2 rounded-xl border border-slate-700/50 flex-1">
                                <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold mb-0.5">Tiền đang có</p>
                                <p class="text-emerald-400 font-bold text-sm">${formatVND(stats.totalCash)}</p>
                            </div>
                            <div class="bg-slate-800/60 px-3 py-2 rounded-xl border border-slate-700/50 flex-1">
                                <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold mb-0.5">Dư nợ tín dụng</p>
                                <p class="text-rose-400 font-bold text-sm">${formatVND(stats.totalCredit)}</p>
                            </div>
                        </div>
                    </div>
                </div>`;

            html += `<div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-2 border-b border-slate-50 mb-2">
                    <button onclick="app.setDashFilter('period', 'month')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${state.dashboardFilter.period==='month'?'bg-indigo-50 text-indigo-600':'text-slate-500 hover:bg-slate-50'}">Tháng này</button>
                    <button onclick="app.setDashFilter('period', 'lastMonth')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${state.dashboardFilter.period==='lastMonth'?'bg-indigo-50 text-indigo-600':'text-slate-500 hover:bg-slate-50'}">Tháng trước</button>
                    <button onclick="app.setDashFilter('period', 'all')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${state.dashboardFilter.period==='all'?'bg-indigo-50 text-indigo-600':'text-slate-500 hover:bg-slate-50'}">Tất cả</button>
                    <button onclick="app.setDashFilter('period', 'custom')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${state.dashboardFilter.period==='custom'?'bg-indigo-50 text-indigo-600':'text-slate-500 hover:bg-slate-50'}"><i class="ph ph-calendar"></i> Tùy chọn</button>
                </div>
                ${state.dashboardFilter.period === 'custom' ? `
                    <div class="flex gap-2 mb-2 fade-in">
                        <input type="date" id="dash-start" value="${state.dashboardFilter.startDate}" onchange="app.updateCustomDate()" class="flex-1 text-xs p-2 border rounded-lg bg-slate-50" />
                        <span class="text-slate-400 self-center">-</span>
                        <input type="date" id="dash-end" value="${state.dashboardFilter.endDate}" onchange="app.updateCustomDate()" class="flex-1 text-xs p-2 border rounded-lg bg-slate-50" />
                    </div>
                ` : ''}
                <div class="flex items-center gap-2">
                    <i class="ph ph-funnel text-slate-400"></i>
                    <select onchange="app.setDashFilter('walletId', this.value)" class="flex-1 text-xs p-1.5 bg-slate-50 border border-slate-100 rounded-lg text-slate-600 font-medium focus:outline-none">
                        <option value="all" ${state.dashboardFilter.walletId === 'all' ? 'selected' : ''}>Tất cả nguồn tiền</option>
                        ${state.wallets.filter(w=>w.status!=='deleted').map(w => `<option value="${w.id}" ${state.dashboardFilter.walletId === w.id ? 'selected' : ''}>${w.name}</option>`).join('')}
                    </select>
                </div>
            </div>`;

            html += `<div class="flex justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div>
                    <div class="flex items-center text-emerald-500 text-[11px] font-bold mb-1 uppercase"><i class="ph-bold ph-trend-up mr-1 text-sm"></i> Tổng thu</div>
                    <p class="font-bold text-lg">${formatVND(stats.totalIncome)}</p>
                </div>
                <div class="text-right">
                    <div class="flex items-center justify-end text-rose-500 text-[11px] font-bold mb-1 uppercase"><i class="ph-bold ph-trend-down mr-1 text-sm"></i> Tổng chi</div>
                    <p class="font-bold text-lg">${formatVND(stats.totalExpense)}</p>
                </div>
            </div>`;

            if (overBudget) {
                html += `<div class="bg-orange-50 border border-orange-100 rounded-xl p-4 flex gap-3 items-start">
                    <i class="ph-fill ph-warning-circle text-orange-500 text-xl"></i>
                    <div>
                        <h4 class="text-orange-800 font-semibold text-sm">Cảnh báo ngân sách</h4>
                        <p class="text-orange-600 text-xs mt-1">Chi tiêu tháng này đã vượt 70% tổng thu. Nên cân đối lại.</p>
                    </div>
                </div>`;
            }

            html += `<div>
                <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="ph-fill ph-chart-pie-slice mr-2 text-indigo-500 text-lg"></i> Cơ cấu chi tiêu</h3>
                <div class="space-y-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">`;
            
            catStats.forEach(stat => {
                html += `<div onclick="app.viewCategoryDetails('${stat.category.id}')" class="border-b border-slate-100/50 last:border-0 pb-3 last:pb-0 cursor-pointer hover:bg-slate-50 transition p-1 rounded">
                    <div class="flex justify-between items-end mb-1">
                        <span class="font-bold text-slate-700 text-sm flex items-center gap-1.5"><div class="w-2 h-2 rounded-full ${stat.category.color}"></div> ${stat.category.name}</span>
                        <span class="font-semibold text-slate-800 text-sm">${formatVND(stat.amount)}</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 mb-2 overflow-hidden">
                        <div class="${stat.category.color} h-2 rounded-full transition-all duration-500" style="width: ${stat.percent}%"></div>
                    </div>
                    <div class="space-y-1 mt-1.5 pl-3 border-l-2 border-slate-100">`;
                stat.walletDetails.forEach(detail => {
                    html += `<div class="flex justify-between items-center">
                        <span class="text-[10px] text-slate-500 font-medium">Từ: ${detail.walletName}</span>
                        <span class="text-[10px] text-slate-600 font-semibold">${formatVND(detail.amount)}</span>
                    </div>`;
                });
                html += `</div></div>`;
            });
            if(catStats.length === 0) html += `<p class="text-center text-sm text-slate-400 py-2">Chưa có dữ liệu chi tiêu.</p>`;
            
            html += `</div></div><div>
                <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="ph-fill ph-clock-counter-clockwise mr-2 text-indigo-500 text-lg"></i> Lịch sử giao dịch</h3>
                <div class="space-y-4">`;

            grouped.forEach(group => {
                const [year, month, day] = group.date.split('-');
                const dailyTotal = group.items.reduce((sum, t) => sum + (t.type === 'expense' ? -t.amount : t.amount), 0);
                html += `<div class="bg-white p-1 rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="flex justify-between items-center bg-slate-50 px-4 py-2 border-b border-slate-100">
                        <span class="font-semibold text-slate-700 text-sm">${day}/${month}/${year}</span>
                        <span class="text-sm font-bold ${dailyTotal >= 0 ? 'text-emerald-500' : 'text-slate-800'}">${dailyTotal >= 0 ? '+' : ''}${formatVND(dailyTotal)}</span>
                    </div>
                    <div class="p-2 space-y-1">`;
                group.items.forEach(t => {
                    const cat = state.categories.find(c => c.id === t.categoryId) || {name: 'Khác', color:'bg-slate-400'};
                    const isExp = t.type === 'expense';
                    const w = state.wallets.find(w => w.id === t.walletId);
                    const wName = w ? w.name : 'Ví đã xóa';

                    html += `<div onclick="app.editTx('${t.id}')" class="flex items-center justify-between p-2 rounded-xl hover:bg-slate-100 cursor-pointer transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center text-white ${cat.color} text-lg shrink-0">
                                <i class="ph-bold ${isExp ? 'ph-trend-down' : 'ph-trend-up'}"></i>
                            </div>
                            <div class="overflow-hidden">
                                <p class="font-semibold text-slate-800 text-sm truncate">${t.note || cat.name}</p>
                                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider truncate">${t.time||''} • ${cat.name} • ${wName} ${t.hasImage ? '📎' : ''}</p>
                            </div>
                        </div>
                        <p class="font-bold text-sm ${isExp ? 'text-slate-800' : 'text-emerald-500'} shrink-0">${isExp ? '-' : '+'}${formatVND(t.amount)}</p>
                    </div>`;
                });
                html += `</div></div>`;
            });
            if(grouped.length === 0) html += `<p class="text-center text-slate-400 text-sm py-4">Chưa có giao dịch nào.</p>`;
            return html + `</div></div></div>`;
        }

        function renderAddTransaction() {
            const form = state.txForm;
            const isEdit = !!form.id;
            const availableWallets = state.wallets.filter(w => w.status === 'active' || (isEdit && w.id === form.walletId));
            
            let html = `<div class="p-4 bg-slate-50 fade-in pb-24">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">${isEdit ? 'Sửa giao dịch' : 'Thêm giao dịch'}</h2>
                    ${isEdit ? `<button onclick="app.setTab('home')" class="text-slate-500 text-sm font-semibold p-2 bg-slate-200 rounded-lg">Hủy</button>` : ''}
                </div>`;

            html += `<div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="app.setTxType('expense')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${form.type === 'expense' ? 'bg-white shadow text-rose-500' : 'text-slate-500'}">Chi Tiền</button>
                    <button onclick="app.setTxType('income')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${form.type === 'income' ? 'bg-white shadow text-emerald-500' : 'text-slate-500'}">Thu Tiền</button>
                </div>
                
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Số tiền</label>
                    <div class="relative">
                        <input type="number" id="inp-amount" value="${form.amount}" oninput="app.updateFormState()" placeholder="0" class="w-full text-3xl font-bold text-slate-800 border-b-2 border-slate-200 pb-2 bg-transparent focus:outline-none" />
                        <span class="absolute right-0 bottom-3 text-slate-400 font-medium">VND</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Ngày</label>
                        <input type="date" id="inp-date" value="${form.date}" oninput="app.updateFormState()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" />
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Thời gian</label>
                        <input type="time" id="inp-time" value="${form.time}" oninput="app.updateFormState()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" />
                    </div>
                </div>

                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase block mb-1">Từ nguồn tiền</label>
                    <select id="inp-wallet" onchange="app.updateFormState()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium">

        function renderReports() {
            const d = new Date();
            let currStart, currEnd, lastStart, lastEnd, periodLabel = '';
            
            if (state.reportPeriod === 'month') {
                currStart = new Date(d.getFullYear(), d.getMonth(), 1);
                currEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
                lastStart = new Date(d.getFullYear(), d.getMonth() - 1, 1);
                lastEnd = new Date(d.getFullYear(), d.getMonth(), 0, 23, 59, 59);
                periodLabel = 'Tháng này vs Tháng trước';
            } else if (state.reportPeriod === 'year') {
                currStart = new Date(d.getFullYear(), 0, 1);
                currEnd = new Date(d.getFullYear(), 11, 31, 23, 59, 59);
                lastStart = new Date(d.getFullYear() - 1, 0, 1);
                lastEnd = new Date(d.getFullYear() - 1, 11, 31, 23, 59, 59);
                periodLabel = `Năm ${d.getFullYear()} vs Năm ${d.getFullYear() - 1}`;
            }

            let currExpense = 0, lastExpense = 0;
            const categoryDiff = {};

            state.transactions.filter(t => t.type === 'expense').forEach(t => {
                const txD = new Date(t.date + "T" + (t.time || "12:00") + ":00");
                const isCurr = txD >= currStart && txD <= currEnd;
                const isLast = txD >= lastStart && txD <= lastEnd;

                if (isCurr || isLast) {
                    if (!categoryDiff[t.categoryId]) categoryDiff[t.categoryId] = { curr: 0, last: 0 };
                    if (isCurr) { currExpense += t.amount; categoryDiff[t.categoryId].curr += t.amount; }
                    if (isLast) { lastExpense += t.amount; categoryDiff[t.categoryId].last += t.amount; }
                }
            });

            const diff = currExpense - lastExpense;
            const details = Object.keys(categoryDiff).map(id => {
                return {
                    category: state.categories.find(c => c.id === id) || {name: 'Khác', color:'bg-slate-400'},
                    curr: categoryDiff[id].curr, last: categoryDiff[id].last,
                    diff: categoryDiff[id].curr - categoryDiff[id].last
                };
            }).filter(d => d.curr > 0 || d.last > 0).sort((a,b) => b.diff - a.diff);

            let html = `<div class="p-4 fade-in pb-24"><div class="flex flex-col gap-4 mb-4">
                <h2 class="text-2xl font-bold text-slate-800">Phân tích chênh lệch</h2>
                <div class="bg-slate-200 p-1 rounded-xl flex w-full">
                    <button onclick="app.setReportPeriod('month')" class="flex-1 py-1.5 text-sm font-semibold rounded-lg transition-all ${state.reportPeriod === 'month' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}">Tháng</button>
                    <button onclick="app.setReportPeriod('year')" class="flex-1 py-1.5 text-sm font-semibold rounded-lg transition-all ${state.reportPeriod === 'year' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}">Năm</button>
                </div></div>`;

            html += `<div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
                <p class="text-slate-500 font-medium text-xs text-center mb-5 uppercase tracking-wider">${periodLabel}</p>
                <div class="flex justify-between items-center relative">
                    <div class="text-center w-[45%] z-10 bg-white/80 rounded-lg p-1">
                        <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Kỳ này</p>
                        <p class="font-bold text-lg text-slate-800">${formatVND(currExpense)}</p>
                    </div>
                    <div class="w-[10%] flex justify-center z-10">
                        <div class="px-2 py-1 rounded-full text-[10px] font-bold border ${diff > 0 ? 'bg-rose-50 text-rose-600 border-rose-200' : 'bg-emerald-50 text-emerald-600 border-emerald-200'}">${diff > 0 ? 'TĂNG' : 'GIẢM'}</div>
                    </div>
                    <div class="text-center w-[45%] z-10 bg-white/80 rounded-lg p-1">
                        <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Kỳ trước</p>
                        <p class="font-bold text-lg text-slate-500">${formatVND(lastExpense)}</p>
                    </div>
                    <div class="absolute top-1/2 left-0 w-full h-8 -translate-y-1/2 bg-slate-50 rounded-lg flex overflow-hidden">
                        <div class="${diff > 0 ? 'bg-rose-100' : 'bg-emerald-100'} h-full transition-all" style="width: 50%"></div>
                    </div>
                </div>
                <div class="mt-5 text-center">
                    <p class="text-sm font-medium text-slate-600">Mức chênh lệch: <span class="font-bold ${diff > 0 ? 'text-rose-500' : 'text-emerald-500'}">${diff > 0 ? '+' : ''}${formatVND(diff)}</span></p>
                </div>
            </div>`;

            html += `<div><h3 class="font-bold text-slate-800 mb-4 text-sm uppercase tracking-wide">Tại sao có sự thay đổi?</h3><div class="space-y-3">`;
            details.forEach(d => {
                const isIncrease = d.diff > 0;
                html += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-10 rounded-full ${d.category.color}"></div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${d.category.name}</p>
                            <p class="text-[10px] font-medium text-slate-400 mt-0.5">${formatVND(d.curr)} <span class="font-normal italic">so với</span> ${formatVND(d.last)}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center justify-end text-xs font-bold ${isIncrease ? 'text-rose-500' : 'text-emerald-500'}">
                            <i class="ph-bold ${isIncrease ? 'ph-arrow-up-right' : 'ph-arrow-down-right'} mr-1"></i>${formatVND(Math.abs(d.diff))}
                        </div>
                    </div>
                </div>`;
            });
            if(details.length === 0) html += `<div class="text-center py-10 bg-white rounded-2xl border border-dashed"><p class="text-slate-500 text-sm">Chưa có dữ liệu so sánh.</p></div>`;
            return html + `</div></div></div>`;
        }

        window.app = {
            render() {
                if(!state.isDataLoaded) return;
                const main = document.getElementById('main-content');
                
                if (state.activeTab === 'home') main.innerHTML = renderDashboard();
                else if (state.activeTab === 'add') main.innerHTML = renderAddTransaction();
                else if (state.activeTab === 'wallets') main.innerHTML = renderWallets();
                else if (state.activeTab === 'add-wallet') main.innerHTML = renderAddWallet();
                else if (state.activeTab === 'wallet-details') main.innerHTML = renderWalletDetails();
                else if (state.activeTab === 'category-details') main.innerHTML = renderCategoryDetails();
                else if (state.activeTab === 'reports') main.innerHTML = renderReports();

                ['home', 'wallets', 'reports'].forEach(tab => {
                    const el = document.getElementById(`nav-${tab}`);
                    if (!el) return;
                    let isActive = state.activeTab === tab || (tab==='home' && state.activeTab==='category-details') || (tab==='wallets' && (state.activeTab==='wallet-details'||state.activeTab==='add-wallet'));
                    el.className = `flex flex-col items-center gap-1 w-16 transition-colors ${isActive ? 'text-indigo-600' : 'text-slate-400'}`;
                });
            },
            setTab(tab) { state.activeTab = tab; document.getElementById('main-content').scrollTop = 0; this.render(); },
            
            setDashFilter(key, val) { state.dashboardFilter[key] = val; this.render(); },
            updateCustomDate() {
                state.dashboardFilter.startDate = document.getElementById('dash-start').value;
                state.dashboardFilter.endDate = document.getElementById('dash-end').value;
                this.render();
            },

            viewCategoryDetails(id) { state.selectedCategoryId = id; this.setTab('category-details'); },
            setCatFilter(period) { state.catFilterPeriod = period; this.render(); },
            setReportPeriod(period) { state.reportPeriod = period; this.render(); },

            openAddTx() {
                const now = new Date();
                const activeWallets = state.wallets.filter(w => w.status === 'active');
                state.txForm = { id: null, amount: '', note: '', type: 'expense', categoryId: state.categories.filter(c=>c.type==='expense')[0]?.id || 'c1', walletId: activeWallets[0]?.id || '', date: now.toISOString().split('T')[0], time: now.toTimeString().slice(0,5), hasImage: false };
                this.setTab('add');
            },
            editTx(id) {
                const tx = state.transactions.find(t => t.id === id);
                if(tx) { state.txForm = { ...tx }; this.setTab('add'); }
            },
            updateFormState() {
                ['amount', 'date', 'time', 'walletId', 'note'].forEach(k => {
                    const el = document.getElementById(`inp-${k}`);
                    if(el) state.txForm[k] = el.value;
                });
                if(state.isAddingCategory) {
                    const el = document.getElementById('inp-new-cat');
                    if(el) state.newCategoryName = el.value;
                }
            },
            setTxType(type) { this.updateFormState(); state.txForm.type = type; state.txForm.categoryId = state.categories.find(c => c.type === type).id; this.render(); },
            setTxCategory(id) { this.updateFormState(); state.txForm.categoryId = id; this.render(); },
            
            toggleAddCategory() { this.updateFormState(); state.isAddingCategory = !state.isAddingCategory; this.render(); },
            async saveNewCategory() {
                this.updateFormState();
                if(!state.newCategoryName.trim()) return;
                const colors = ['bg-amber-500', 'bg-lime-500', 'bg-cyan-500', 'bg-fuchsia-500', 'bg-rose-500', 'bg-sky-500'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                
                const newCat = { id: `c${Date.now()}`, name: state.newCategoryName.trim(), type: state.txForm.type, color: randomColor };
                state.categories.push(newCat);
                state.txForm.categoryId = newCat.id; 
                state.isAddingCategory = false; state.newCategoryName = '';
                
                try { await setDoc(doc(db, 'users', state.userId), { categories: state.categories }, { merge: true }); } catch(e) {}
                this.render();
            },

            async saveTx() {
                this.updateFormState();
                if (!state.txForm.amount || !state.txForm.walletId) return;
                
                // Loại bỏ dấu phẩy để lấy số nguyên
                const amt = parseInt(state.txForm.amount.toString().replace(/,/g, ''));
                
                let updatedWallets = JSON.parse(JSON.stringify(state.wallets)); // Deep copy để tránh mutate state cũ
                let updatedTxs = [...state.transactions];

                // NẾU LÀ SỬA GIAO DỊCH (EDIT)
                if (state.txForm.id) {
                    const oldTx = state.transactions.find(t => t.id === state.txForm.id);
                    if (oldTx) {
                        // 1. Hoàn tác số tiền của giao dịch cũ vào ví cũ
                        const wOld = updatedWallets.find(w => w.id === oldTx.walletId);
                        if(wOld) {
                            wOld.balance -= (oldTx.type === 'income' ? oldTx.amount : -oldTx.amount);
                        }
                        
                        // 2. Xóa giao dịch cũ khỏi mảng
                        updatedTxs = updatedTxs.filter(t => t.id !== state.txForm.id);
                    }
                }
                
                // ÁP DỤNG THÔNG TIN MỚI (Cho cả Tạo mới và Sửa)
                // 1. Trừ/Cộng số tiền mới vào ví mới
                const wNew = updatedWallets.find(w => w.id === state.txForm.walletId);
                if(wNew) {
                    wNew.balance += (state.txForm.type === 'income' ? amt : -amt);
                }
                
                // 2. Thêm giao dịch mới vào mảng
                updatedTxs.push({ 
                    ...state.txForm, 
                    id: state.txForm.id || `t${Date.now()}`, 
                    amount: amt 
                });

                // Cập nhật lên Firebase
                try {
                    await setDoc(doc(db, 'users', state.userId), { 
                        wallets: updatedWallets, 
                        transactions: updatedTxs 
                    }, { merge: true });
                    
                    this.setTab('home');
                } catch(e) { 
                    console.error("Lỗi khi lưu giao dịch:", e);
                    alert("Có lỗi xảy ra khi lưu lên đám mây. Vui lòng kiểm tra kết nối mạng.");
                }
            },
            async deleteTx() {
                if (!state.isConfirmingDelete) {
                    state.isConfirmingDelete = true; this.render();
                    setTimeout(() => { state.isConfirmingDelete = false; if(state.activeTab==='add') this.render(); }, 3000); return;
                }
                const oldTx = state.transactions.find(t => t.id === state.txForm.id);
                let updatedWallets = [...state.wallets];
                const wOld = updatedWallets.find(w => w.id === oldTx.walletId);
                if(wOld) wOld.balance -= (oldTx.type === 'income' ? oldTx.amount : -oldTx.amount);
                
                try {
                    await setDoc(doc(db, 'users', state.userId), { wallets: updatedWallets, transactions: state.transactions.filter(t => t.id !== state.txForm.id) }, { merge: true });
                    this.setTab('home');
                } catch(e) { console.error(e); }
            },

            openAddWallet() { state.walletForm = { id: null, name: '', type: 'cash', balance: '', limit: '', includeInNet: true }; this.setTab('add-wallet'); },
            editWallet(id) { 
                const w = state.wallets.find(w => w.id === id); 
                if (w) { 
                    state.walletForm = { ...w, balance: Math.abs(w.balance).toString(), limit: w.limit ? w.limit.toString() : '', includeInNet: w.includeInNet !== false }; 
                    this.setTab('add-wallet'); 
                } 
            },
            updateWalletForm() {
                state.walletForm.name = document.getElementById('w-name')?.value || '';
                state.walletForm.balance = document.getElementById('w-balance')?.value || '';
                state.walletForm.limit = document.getElementById('w-limit')?.value || ''; 
                const chk = document.getElementById('w-include');
                if(chk) state.walletForm.includeInNet = chk.checked;
            },
            setWalletType(type) { this.updateWalletForm(); state.walletForm.type = type; this.render(); },
            async saveWallet() {
                this.updateWalletForm();
                if(!state.walletForm.name || state.walletForm.balance === '') return;
                
                let bal = parseInt(state.walletForm.balance.replace(/,/g,'')) || 0;
                let lim = parseInt(state.walletForm.limit.replace(/,/g,'')) || 0; 

                if(state.walletForm.type === 'credit' && bal > 0) bal = -Math.abs(bal);
                else bal = Math.abs(bal);
                
                let updatedWallets = [...state.wallets];
                if (state.walletForm.id) {
                    const idx = updatedWallets.findIndex(w => w.id === state.walletForm.id);
                    if (idx > -1) updatedWallets[idx] = { ...updatedWallets[idx], name: state.walletForm.name, type: state.walletForm.type, balance: bal, limit: lim, includeInNet: state.walletForm.includeInNet };
                } else {
                    updatedWallets.push({ id: `w${Date.now()}`, name: state.walletForm.name, type: state.walletForm.type, balance: bal, limit: lim, includeInNet: state.walletForm.includeInNet, status: 'active' });
                }

                try {
                    await setDoc(doc(db, 'users', state.userId), { wallets: updatedWallets }, { merge: true });
                    this.setTab('wallets');
                } catch(e) { console.error(e); }
            },
            viewWalletDetails(id) { state.selectedWalletId = id; this.setTab('wallet-details'); },
            setWalletFilter(period) { state.walletFilterPeriod = period; this.render(); },
            
            async toggleLockWallet(id) {
                let updatedWallets = state.wallets.map(w => w.id === id ? { ...w, status: w.status === 'locked' ? 'active' : 'locked' } : w);
                try { await setDoc(doc(db, 'users', state.userId), { wallets: updatedWallets }, { merge: true }); } catch(e) {}
            },
            async deleteWallet(id) {
                if (state.confirmingDeleteWalletId !== id) {
                    state.confirmingDeleteWalletId = id; this.render();
                    setTimeout(() => { state.confirmingDeleteWalletId = null; if(state.activeTab==='wallets') this.render(); }, 3000); return;
                }
                let updatedWallets = state.wallets.map(w => w.id === id ? { ...w, status: 'deleted' } : w);
                try { await setDoc(doc(db, 'users', state.userId), { wallets: updatedWallets }, { merge: true }); state.confirmingDeleteWalletId = null; } catch(e) {}
            }
        };

        async function initFirebase() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        state.userId = "huychu_master_database";
                        const docRef = doc(db, 'users', state.userId);
                        
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            state.wallets = data.wallets || [];
                            state.transactions = data.transactions || [];
                            if(data.categories && data.categories.length > 0) {
                                state.categories = data.categories;
                            } else {
                                state.categories = defaultCategories;
                                setDoc(docRef, { categories: defaultCategories }, { merge: true });
                            }
                        } else {
                            const initW = [ { id: 'w1', name: 'Tiền mặt', type: 'cash', balance: 0, status: 'active', includeInNet: true } ];
                            await setDoc(docRef, { wallets: initW, transactions: [], categories: defaultCategories });
                            state.wallets = initW;
                            state.transactions = [];
                            state.categories = defaultCategories;
                        }

                        state.isDataLoaded = true;
                        const loader = document.getElementById('loader');
                        if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 300); }
                        window.app.render();

                        onSnapshot(docRef, (snap) => {
                            if (snap.exists() && state.isDataLoaded) {
                                const data = snap.data();
                                state.wallets = data.wallets || [];
                                state.transactions = data.transactions || [];
                                if(data.categories) state.categories = data.categories;
                                
                                const status = document.getElementById('sync-status');
                                if(status) {
                                    status.classList.remove('bg-slate-300'); status.classList.add('bg-green-500');
                                    setTimeout(() => { status.classList.remove('bg-green-500'); status.classList.add('bg-slate-300'); }, 1000);
                                }
                                window.app.render();
                            }
                        });
                    }
                });
            } catch (error) {
                console.error(error);
                document.getElementById('loader-text').innerHTML = `<span class="text-rose-500 font-bold">Lỗi Kết Nối</span>`;
            }
        }
        initFirebase();
    </script>
</body>
</html>
